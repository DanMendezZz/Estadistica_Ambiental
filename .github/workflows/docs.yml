name: Docs — mkdocs site

on:
  push:
    branches: [main]
    paths:
      - "mkdocs.yml"
      - "docs/**"
      - "src/**"
      - "CHANGELOG.md"
      - "pyproject.toml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: write   # mkdocs gh-deploy push to gh-pages branch

concurrency:
  group: docs-mkdocs
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build mkdocs site and deploy to gh-pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package with docs extras
        run: pip install -e ".[docs]"

      - name: Validate mkdocs build (strict)
        run: mkdocs build --strict

      - name: Configure git for gh-deploy
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Deploy to gh-pages branch
        run: mkdocs gh-deploy --force --no-history
