name: Scheduled checks

on:
  schedule:
    # Lunes a las 08:00 UTC (03:00 Bogotá)
    - cron: "0 8 * * 1"
  workflow_dispatch:   # permite ejecución manual desde GitHub UI

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Drift de dependencias
  # Verifica que los tests pasen con las últimas versiones disponibles
  # ─────────────────────────────────────────────
  dependency-drift:
    name: Dependency drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install latest versions (sin pinning)
        run: pip install -e ".[dev]" --upgrade

      - name: Run tests
        run: python -m pytest tests/ -q --tb=short

      - name: Report drift
        if: failure()
        run: |
          echo "⚠️ Los tests fallaron con las últimas versiones de dependencias."
          echo "Revisar si hay breaking changes en pandas, statsmodels, xgboost, etc."
          pip list --outdated

  # ─────────────────────────────────────────────
  # JOB 2: Auditoría de seguridad semanal
  # ─────────────────────────────────────────────
  security-audit:
    name: Weekly security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit + safety
        run: pip install pip-audit

      - name: Audit requirements
        run: pip-audit -r requirements.txt --progress-spinner off

      - name: Create issue si hay vulnerabilidades
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ Vulnerabilidades detectadas — ${new Date().toISOString().split('T')[0]}`,
              body: 'La auditoría semanal de seguridad detectó vulnerabilidades en las dependencias.\nRevisar el workflow "Scheduled checks" para detalles.',
              labels: ['security', 'dependencies']
            })
